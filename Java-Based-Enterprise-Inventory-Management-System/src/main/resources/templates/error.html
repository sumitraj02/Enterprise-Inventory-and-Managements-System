<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#3a7d6b,#7ec9a3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .error-card{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
            width:100%;
            max-width:500px;
        }

        .error-icon{
            font-size:60px;
            color:#dc3545;
            margin-bottom:10px;
        }

        .title{
            font-weight:bold;
            margin-bottom:15px;
        }

        .error-text{
            font-size:16px;
            color:#555;
            margin-bottom:25px;
        }

        .btn-back{
            border-radius:25px;
            padding:10px 20px;
            transition:0.3s;
        }

        .btn-back:hover{
            transform:scale(1.05);
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

<div class="error-card">

    <div class="error-icon">
        <i class="bi bi-exclamation-triangle-fill"></i>
    </div>

    <h3 class="title text-danger">
        Error Occurred
    </h3>

    <p class="error-text" th:text="${errorMessage}">
        Something went wrong.
    </p>

    <a th:href="@{/dashboard}" class="btn btn-secondary btn-back">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>

</div>

</body>
</html>
