<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#3a7d6b,#7ec9a3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            width:100%;
            max-width:400px;
        }

        .title{
            text-align:center;
            font-weight:bold;
            margin-bottom:20px;
        }

        .login-icon{
            font-size:50px;
            color:#3a7d6b;
            text-align:center;
            margin-bottom:10px;
        }

        .form-control{
            border-radius:10px;
            padding:10px;
        }

        .input-group-text{
            background:#f1f1f1;
        }

        .btn-login{
            border-radius:30px;
            padding:10px;
            transition:0.3s;
        }

        .btn-login:hover{
            transform:scale(1.05);
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        .signup-link{
            text-align:center;
            margin-top:15px;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="login-icon">
        <i class="bi bi-shield-lock"></i>
    </div>

    <h3 class="title">Inventory Login</h3>

    <!-- LOGIN ERROR MESSAGE -->
    <div th:if="${param.error}" class="alert alert-danger">
        Invalid username or password
    </div>

    <!-- LOGOUT MESSAGE -->
    <div th:if="${param.logout}" class="alert alert-success">
        You have been logged out
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post">

        <!-- Username -->
        <div class="mb-3">

            <label class="form-label">Username</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-person"></i>
                </span>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter username"
                       required>

            </div>

        </div>

        <!-- Password -->
        <div class="mb-3">

            <label class="form-label">Password</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter password"
                       required>

            </div>

        </div>

        <!-- Login Button -->
        <button type="submit" class="btn btn-success btn-login w-100">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </button>

    </form>

    <!-- SIGNUP BUTTON -->
    <div class="signup-link">

        <p class="mt-3">Not registered?</p>

        <a th:href="@{/signup}" class="btn btn-outline-primary w-100">
            <i class="bi bi-person-plus"></i> Create Account
        </a>

    </div>

</div>

</body>
</html>
