<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#3a7d6b,#7ec9a3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .dashboard-card{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            width:100%;
            max-width:1000px;
        }

        .title{
            text-align:center;
            font-weight:bold;
            margin-bottom:30px;
        }

        .stat-card{
            border:none;
            border-radius:12px;
            transition:0.3s;
        }

        .stat-card:hover{
            transform:scale(1.05);
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .stat-icon{
            font-size:28px;
            margin-bottom:10px;
        }

        .btn-action{
            border-radius:25px;
            padding:10px 18px;
            margin:5px;
            transition:0.3s;
        }

        .btn-action:hover{
            transform:scale(1.05);
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

<div class="dashboard-card">

    <h3 class="title">
        <i class="bi bi-speedometer2"></i> Inventory Dashboard
    </h3>

    <div class="row g-4">

        <!-- Total Products -->
        <div class="col-md-4">
            <div class="card stat-card text-center p-3 shadow-sm">

                <div class="stat-icon text-primary">
                    <i class="bi bi-box"></i>
                </div>

                <h5>Total Products</h5>

                <h3 th:text="${totalProducts}"></h3>

            </div>
        </div>

        <!-- Total Inventory Value -->
        <div class="col-md-4">
            <div class="card stat-card text-center p-3 shadow-sm bg-light">

                <div class="stat-icon text-success">
                    <i class="bi bi-currency-rupee"></i>
                </div>

                <h5>Total Inventory Value</h5>

                <h3>₹ <span th:text="${totalInventoryValue}"></span></h3>

            </div>
        </div>

        <!-- Low Stock Count -->
        <div class="col-md-4">
            <div class="card stat-card text-center p-3 shadow-sm bg-warning">

                <div class="stat-icon text-dark">
                    <i class="bi bi-exclamation-triangle"></i>
                </div>

                <h5>Low Stock Products</h5>

                <h3 th:text="${lowStockCount}"></h3>

            </div>
        </div>

    </div>

    <!-- Action Buttons -->

    <div class="text-center mt-4">

        <a th:href="@{/products}" class="btn btn-primary btn-action">
            <i class="bi bi-box"></i> Products
        </a>

        <a th:href="@{/low-stock}" class="btn btn-warning btn-action">
            <i class="bi bi-exclamation-triangle"></i> Low Stock
        </a>

        <a th:href="@{/logs}" class="btn btn-info btn-action">
            <i class="bi bi-clock-history"></i> Stock Logs
        </a>

        <a th:href="@{/reports/export}" class="btn btn-success btn-action">
            <i class="bi bi-download"></i> Export CSV
        </a>

        <a th:href="@{/reports/logs/export}" class="btn btn-secondary btn-action">
            <i class="bi bi-file-earmark"></i> Export Logs
        </a>

        <a th:href="@{/logout}" class="btn btn-danger btn-action">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>

    </div>

</div>

</body>
</html>
