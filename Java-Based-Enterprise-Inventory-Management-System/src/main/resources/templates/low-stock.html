<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Low Stock Products</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#3a7d6b,#7ec9a3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .page-card{
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            width:100%;
            max-width:800px;
        }

        .title{
            text-align:center;
            font-weight:bold;
            margin-bottom:25px;
        }

        .table thead{
            background:#ffc107;
        }

        .table{
            border-radius:10px;
            overflow:hidden;
        }

        .btn-back{
            border-radius:25px;
            padding:10px 20px;
            transition:0.3s;
        }

        .btn-back:hover{
            transform:scale(1.05);
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

<div class="page-card">

    <h3 class="title">
        <i class="bi bi-exclamation-triangle-fill text-warning"></i>
        Low Stock Products
    </h3>

    <table class="table table-hover table-striped">

        <thead>
        <tr>
            <th><i class="bi bi-box"></i> Product Name</th>
            <th><i class="bi bi-hash"></i> Quantity</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="p : ${products}">

            <td th:text="${p.name}"></td>

            <td class="text-danger fw-bold" th:text="${p.quantity}"></td>

        </tr>

        </tbody>

    </table>

    <div class="text-center mt-4">

        <a th:href="@{/dashboard}" class="btn btn-secondary btn-back">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
