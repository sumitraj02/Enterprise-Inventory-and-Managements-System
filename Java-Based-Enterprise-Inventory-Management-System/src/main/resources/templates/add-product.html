<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#3a7d6b,#7ec9a3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-card{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            width:100%;
            max-width:600px;
        }

        .title{
            text-align:center;
            font-weight:bold;
            margin-bottom:25px;
        }

        .form-control{
            border-radius:10px;
            padding:10px;
        }

        .input-group-text{
            background:#f1f1f1;
        }

        .btn-custom{
            border-radius:30px;
            padding:10px 20px;
            transition:0.3s;
        }

        .btn-custom:hover{
            transform:scale(1.05);
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

<div class="form-card">

    <h3 class="title">
        <i class="bi bi-box-seam"></i> Add Product
    </h3>

    <form th:action="@{/products/save}" method="post">

        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-tag"></i></span>
                <input type="text" name="name" class="form-control" placeholder="Enter product name">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>

            <div class="input-group">
        <span class="input-group-text">
            <i class="bi bi-list"></i>
        </span>

                <select name="category" class="form-control">

                    <option value="">Select Category</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Groceries">Groceries</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Furniture">Furniture</option>
                    <option value="Stationery">Stationery</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Food">Food</option>
                    <option value="Tools">Tools</option>

                </select>

            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-box"></i></span>
                <input type="number" name="quantity" class="form-control" placeholder="Enter quantity">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Price</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-currency-rupee"></i></span>
                <input type="number" step="0.01" name="price" class="form-control" placeholder="Enter price">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Reorder Level</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-arrow-repeat"></i></span>
                <input type="number" name="reorderLevel" class="form-control" placeholder="Enter reorder level">
            </div>
        </div>

        <div class="d-flex justify-content-between mt-4">

            <button class="btn btn-success btn-custom">
                <i class="bi bi-check-circle"></i> Save
            </button>

            <a href="/products" class="btn btn-secondary btn-custom">
                <i class="bi bi-arrow-left"></i> Cancel
            </a>

        </div>

    </form>

</div>

</body>
</html>
